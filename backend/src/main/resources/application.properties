# =============================================
# DATABASE (Railway PostgreSQL via env vars)
# =============================================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ticketing_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:1234}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# =============================================
# SERVER PORT (Railway injects $PORT)
# =============================================
server.port=${PORT:8080}

# =============================================
# JWT
# =============================================
app.jwt.secret=${JWT_SECRET:TicketFlowDefaultSecretKeyMustBe32CharsLong!!}
app.jwt.expirationMs=86400000

# =============================================
# FILE UPLOAD
# =============================================
app.upload.dir=${UPLOAD_DIR:uploads}
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=25MB

# =============================================
# EMAIL (SMTP) — disabled by default
# =============================================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.enabled=${MAIL_ENABLED:false}

# =============================================
# FRONTEND URL (for email links & CORS)
# =============================================
app.frontend.url=${FRONTEND_URL:http://localhost:3000}

# =============================================
# LOGGING (reduce verbosity in production)
# =============================================
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
